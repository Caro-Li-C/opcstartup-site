# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. 从私库拉取内容（structure.json + 76 个 md）
      - name: Pull content from private source repo
        env:
          TOKEN: ${{ secrets.POLICY_MD_TOKEN }}
        run: |
          git clone https://x-access-token:${TOKEN}@github.com/Caro-Li-C/opc-content-source.git _tmp_source

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装 Python 依赖（用于 md 转 HTML）
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install markdown pyyaml

      # 4. 生成政策静态页面（关键：替代原来的 _posts/policy 方案）
      - name: Generate policy pages
        run: python scripts/generate_policy_pages.py

      # 5. 生成政策解析页面（新增）
      - name: Generate analysis pages
        run: python scripts/generate_analysis_pages.py

      # 6. 清理临时文件（不进入构建产物）
      - name: Clean up temp source
        run: rm -rf _tmp_source

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
