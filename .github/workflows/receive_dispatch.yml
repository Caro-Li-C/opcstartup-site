name: Receive Policy Update
on:
  repository_dispatch:
    types: [policy-updated]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout opcstartup-site
        uses: actions/checkout@v4
      - name: Checkout opc-content-source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/opc-content-source
          path: _tmp_source
          token: ${{ secrets.CONTENT_REPO_PAT }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install -r requirements.txt || true
      - name: Generate policy pages
        run: |
          python scripts/generate_policy_pages.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "auto: 政策页面更新 $(date +%Y-%m-%d-%H:%M)"
          git push origin main
