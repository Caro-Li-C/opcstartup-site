<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .policy-page {
        max-width: 720px;
        margin: 0 auto;
        padding: 100px 24px 120px;
    }
    .top-bar {
        background: #1a1a1a;
        padding: 16px 0;
    }
    .top-bar a {
        display: block;
        max-width: 720px;
        margin: 0 auto;
        padding: 0 24px;
        color: #888;
        text-decoration: none;
        font-size: 12px;
        letter-spacing: 1px;
        transition: color 0.3s;
    }
    .top-bar a:hover { color: #fff; }
    .header {
        margin-bottom: 80px;
    }
    .page-title {
        font-size: 52px;
        font-weight: 100;
        letter-spacing: 12px;
        margin-bottom: 16px;
        color: #1a1a1a;
    }
    .divider {
        width: 60px;
        height: 1px;
        background: #1a1a1a;
        margin-bottom: 20px;
    }
    .page-subtitle {
        font-size: 13px;
        color: #999;
        letter-spacing: 4px;
        text-transform: uppercase;
        font-weight: 400;
    }
    .cards {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }
    .card {
        display: block;
        background: #fff;
        padding: 40px 36px;
        text-decoration: none;
        color: #1a1a1a;
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        position: relative;
        border: 1px solid #e5e5e5;
        box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 36px;
        right: 36px;
        height: 1px;
        background: #ddd;
        transition: all 0.4s;
    }
    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.10);
        border-color: #d0d0d0;
    }
    .card:hover::after {
        left: 0;
        right: 0;
        background: #1a1a1a;
    }
    .card-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 10px;
        letter-spacing: 3px;
    }
    .card-desc {
        font-size: 14px;
        color: #555;
        line-height: 1.7;
        font-weight: 400;
    }
    .card-arrow {
        margin-top: 24px;
        font-size: 12px;
        color: #888;
        letter-spacing: 2px;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .card-arrow::after {
        content: "→";
        transition: transform 0.3s;
    }
    .card:hover .card-arrow {
        color: #1a1a1a;
    }
    .card:hover .card-arrow::after {
        transform: translateX(4px);
    }
    @media (max-width: 768px) {
        .page-title { font-size: 36px; letter-spacing: 6px; }
        .policy-page { padding: 60px 20px 80px; }
        .card { padding: 32px 24px; }
    }
</style>
